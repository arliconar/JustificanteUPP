name: Build and Release WinUI 3 App

on:
  push:
    tags:
      - 'v*' # Trigger the workflow on version tags, e.g., v1.0.0
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write # Needed to create a GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: dotnet restore JustificantesUPP\JustificantesUPP.csproj

    - name: Publish the application
      run: dotnet publish JustificantesUPP\JustificantesUPP.csproj -c Release -p:PublishProfile=FolderProfile

    - name: Compress Release Output
      run: |
        Compress-Archive -Path JustificantesUPP\bin\publish\FolderProfile\* -DestinationPath JustificantesUPP-win-x64.zip
      shell: powershell

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: JustificantesUPP-win-x64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
